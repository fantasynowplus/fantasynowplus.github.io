name: Fetch Rankings
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Fetch and Save Data
        run: |
          mkdir -p data
          curl -H "x-api-key: ${{ secrets.FANTASYPROS_API_KEY }}" \
               "https://api.fantasypros.com/public/v2/nfl/rankings?scoring=PPR" \
               > data/rankings.json
      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data/rankings.json
          git commit -m "Update rankings data"
          git push
