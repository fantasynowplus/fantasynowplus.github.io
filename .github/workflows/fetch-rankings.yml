name: Fetch Rankings
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Fetch and Save Data
        run: |
          mkdir -p data
          # Using '|| true' ensures the workflow doesn't fail if the API returns an error
          # This allows the error message to be saved into rankings.json for debugging
          curl -sS "https://api.fantasypros.com/public/v2/nfl/rankings?scoring=PPR&api_key=${{ secrets.FANTASYPROS_API_KEY }}" > data/rankings.json || true
      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data/rankings.json
          git commit -m "Update rankings data"
          git push
