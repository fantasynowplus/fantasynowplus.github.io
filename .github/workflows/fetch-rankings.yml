name: Fetch Rankings
on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: 

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential so the Action has permission to save the file
    steps:
      - uses: actions/checkout@v3
      - name: Fetch and Save Data
        run: |
          mkdir -p data
          # This endpoint is managed and does not require complex auth headers
          curl -sS "https://api.parse.bot/v1/fantasycalc/rankings" > data/rankings.json
      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data/rankings.json
          git commit -m "Automated update: $(date +'%Y-%m-%d')"
          git push
