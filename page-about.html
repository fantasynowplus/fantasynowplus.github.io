<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us | FantasyNow+</title>
    <!-- Include your existing styles here -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        /* Add specific styles for the new sections */
        .section-padding { padding: 60px 20px; max-width: 1000px; margin: auto; }
        .stars { color: #ffa515; }
        .review-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .team-slider { background: #1a2a40; padding: 40px; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

    <!-- YOUR EXISTING HEADER -->
    <header>...</header>
    <div class="ticker-wrap"><div id="news-container" class="ticker-move"></div></div>

    <main>
        <!-- 1. MISSION STATEMENT -->
        <section class="section-padding" style="text-align: center;">
            <h1>Our Mission</h1>
            <p style="font-size: 1.5em;">"To make fantasy football accessible, strategic, and fun for every manager."</p>
        </section>

        <!-- 2. BRAND STORY -->
        <section class="section-padding" style="display: flex; gap: 40px;">
            <div style="flex: 1;"><img src="your-brand-image.jpg" alt="Brand Story"></div>
            <div style="flex: 1;">
                <h2>Our Story</h2>
                <p>Content goes here...</p>
            </div>
        </section>

        <!-- 3. STRONG CTA -->
        <section class="section-padding" style="text-align: center;">
            <a href="page-login.html" class="btn-cta" style="background: #ffa515; padding: 15px 30px; text-decoration: none; color: #000;">Join the Community</a>
        </section>

        <!-- 4. CASE STUDY / SOCIAL PROOF -->
        <section class="section-padding review-grid">
            <div class="review">
                <div class="stars">★★★★★</div>
                <p>"Best rankings I've ever used."</p>
            </div>
            <!-- Repeat for 3 total reviews -->
        </section>

        <!-- 5. TEAM SLIDER -->
        <section class="section-padding team-slider">
            <h2>Meet the Team</h2>
            <!-- Place your slider container here -->
            <div class="slider-container">
                <!-- Example Card Structure -->
                <div class="staff-card">
                    <img src="assets/headshots/Justin.png" alt="Justin">
                    <h3>Justin Bauerle</h3>
                    <p>CEO | Start/Sit Showdown</p>
                    <a href="https://bsky.app/profile/YOUR-HANDLE"><i class="fa-brands fa-bluesky"></i></a>
                </div>
            </div>
        </section>

        <!-- 6. JOIN US FORM -->
        <section class="section-padding">
            <h2>Join Our Team</h2>
            <form>
                <input type="text" placeholder="Name" required>
                <input type="email" placeholder="Email" required>
                <button type="submit">Apply Now</button>
            </form>
        </section>
    </main>

    <!-- YOUR EXISTING FOOTER -->
    <footer>...</footer>
</body>
</html>
