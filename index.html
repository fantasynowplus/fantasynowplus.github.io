<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FantasyNow+ | Content & Tools Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="sleeper-trends.css">
    <link rel="stylesheet" href="rankings.css">
    <link rel="stylesheet" href="youtube.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body onload="loadFeed('UCCW6qFFB7ezwJk1cLPjPHDg', document.getElementById('all-btn')); switchTab('draft', 15, document.querySelector('.cat-bubble'));">

    <header>
        <a href="index.html" class="logo"><img src="fantasy_logo-3.png" alt="FantasyNow+ Logo"></a>
        <nav>
            <a href="rankings.html">Rankings</a>
            <a href="tools.html">Tools & Graphics</a>
            <a href="about.html">About Us</a>
            <a href="https://superleagueff.org" target="_blank">Super League ↗</a>
            <a href="login.html" class="btn-login">Dashboard Login</a>
        </nav>
    </header>

    <div class="ticker-wrap">
        <div id="news-container" class="ticker-move">
            </div>
    </div>

    <main class="dashboard-container" style="max-width: 1400px; margin: 160px auto 40px auto; display: grid; grid-template-columns: 300px 1fr 300px; gap: 20px; padding: 0 20px;">
        
        <!-- Left Sidebar: Trending -->
        <aside class="sidebar">
            <div id="trending-adds" class="sleeper-card">
                <div class="sleeper-header"><div class="sleeper-logo">Trending Adds</div><div class="badge-add">VIA SLEEPER</div></div>
                <div class="sleeper-body" id="adds-list">Loading...</div>
            </div>
            <div id="trending-drops" class="sleeper-card">
                <div class="sleeper-header"><div class="sleeper-logo">Trending Drops</div><div class="badge-drop">VIA SLEEPER</div></div>
                <div class="sleeper-body" id="drops-list">Loading...</div>
            </div>
        </aside>

        <!-- Middle Content -->
        <section class="main-content">
            <div class="youtube-feed-container">
        <!-- Category Navigation -->
                <div class="feed-nav">
                    <button id="all-btn" class="nav-btn active" onclick="loadFeed('UCCW6qFFB7ezwJk1cLPjPHDg', this)">ALL</button>
                    <button class="nav-btn" onclick="loadFeed('PLX9LyZ57O4HC-uG3s0k7udo9vTY8RunU9', this)">OFFSEASON</button>
                    <button class="nav-btn" onclick="loadFeed('PLX9LyZ57O4HAPJ-s1PVL8YsYvhuhC079o', this)">2025 TEAM RECAPS</button>
                    <button class="nav-btn" onclick="loadFeed('PLX9LyZ57O4HBPdMYkX72ETD9uD5ZbVCoi', this)">2025 SEASON</button>
                </div>
        
                <!-- Video Grid -->
                <div id="youtube-feed" class="video-grid">
                    <!-- Videos injected here -->
                </div>
            </div>
        </section>

        <!-- Right Sidebar: Rankings Widget -->
        <aside class="sidebar" id="rankings-widget">
            <div class="social-links">
                    <a href="https://youtube.com/@fantasynowplus" target="_blank"><i class="fa-brands fa-youtube"></i></a>
                    <a href="https://bsky.app/profile/fantasynowplus.com" target="_blank"><i class="fa-brands fa-bluesky"></i></a>
                    <a href="https://discord.gg/EgZcDynavK" target="_blank"><i class="fa-brands fa-discord"></i></a>
                </div>
            <div class="fn-plus-container">
                <div class="fn-plus-header">
                    FANTASYNOW+ RANKINGS
                </div>
                
                <div class="fnp-nav">
                    <div class="bubble cat-bubble active" onclick="switchTab('draft', 12, this)">Draft</div>
                    <div class="bubble cat-bubble" onclick="switchTab('dynasty', 12, this)">Dynasty</div>
                    <div class="bubble cat-bubble" onclick="switchTab('rookie', 12, this)">Rookie</div>
                </div>
                <div class="fnp-nav">
                    <div class="bubble pos-bubble" onclick="switchTab(state.type, 0, this)">QB</div>
                    <div class="bubble pos-bubble" onclick="switchTab(state.type, 3, this)">RB</div>
                    <div class="bubble pos-bubble" onclick="switchTab(state.type, 6, this)">WR</div>
                    <div class="bubble pos-bubble" onclick="switchTab(state.type, 9, this)">TE</div>
                </div>
                
                <div id="rank-list">Loading...</div>
            </div>
        </aside>
    </main>

    <script src="news-ticker.js"></script>
    <script src="sleeper-data.js"></script>
    <script src="rankings.js"></script>
    <script src="youtube-feed.js"></script>
</body>
</html>
