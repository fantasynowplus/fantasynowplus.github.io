---
layout: null
---
{% include header.html %}

<main class="page-container" style="padding: 40px 20px; max-width: 800px; margin: 40px auto; text-align: center;">
    {% include tools-subnav.html %}
    <h1 style="text-align: center; color: white;">#SFB16 Drafted Roster</h1>
    
    <div class="form-content" style="padding: 20px;">

    <div class="input-group sfb-input-group" style="display: flex; justify-content: center; align-items: center; max-width: 410px; margin: 0 auto; gap: 10px; flex-direction: column;">
        
        <select id="platformSelect" class="tool-select" onchange="handlePlatformChange()" style="width: 100%; max-width: 410px;">
            <option value="">-- Select Platform --</option>
            <option value="sleeper">Sleeper</option>
            <option value="mfl">MFL</option>
        </select>

        <select id="leagueSelect" class="tool-select" onchange="handleLeagueChange()" style="width: 100%; max-width: 410px; display: none;">
            <option value="">-- Select League --</option>
        </select>

        <select id="franchiseSelect" class="tool-select" style="width: 100%; max-width: 410px; display: none;">
            <option value="">-- Select Franchise --</option>
        </select>

    </div>

        <button class="tool-btn btn-find" style="margin: 15px auto; display: block; max-width: 410px;" onclick="generateGraphic()">
            GENERATE #SFB16 GRAPHIC
        </button>

        <div id="loader" class="loader">SYNCING DRAFT DATA...</div>

        <canvas id="canvas" style="display:none;"></canvas>

        <div id="resultContainer" style="margin-top: 30px;">
            <img id="finalImage" style="max-width: 100%; display: none; border-radius: 8px; border: 1px solid #334155;" alt="Draft Recap Output">
        </div>
        
        <button id="downloadBtn" class="tool-btn btn-dl" style="display:none; margin: 20px auto; max-width: 410px;" onclick="downloadImg()">
            DOWNLOAD DRAFT IMAGE
        </button>
    </div> 
</main>

<script src="/javascript/sfb-generator.js"></script>
{% include footer.html %}
