---
layout: null
---
{% include header.html %}

<main class="page-container" style="padding: 40px 20px; max-width: 1100px; margin: 40px auto;">
    <h1 style="text-align: center;">#SFB16 Drafted Roster</h1>
    
    <div class="form-content" style="text-align: center; padding: 20px;">
        <div class="input-group" style="max-width: 500px; margin: 0 auto;">
            <select id="leagueSelect" onchange="loadManagers()" class="tool-select">
                <option value="">Loading Leagues...</option>
            </select>
            
            <select id="managerSelect" onchange="enableGenerate()" class="tool-select" style="display:none; margin-top: 10px;">
                <option value="">-- Select Manager --</option>
            </select>
            
            <button id="genBtn" class="tool-btn btn-find" style="display:none; margin-top: 10px; width: 100%;" onclick="generate()">
                GENERATE GRAPHIC
            </button>
        </div>

        <div id="loader" class="loader" style="display:none; margin-top: 20px;">SYNCING DRAFT DATA...</div>

        <div class="roster-canvas-container" style="margin-top: 20px;">
            <canvas id="canvas" style="display:none;"></canvas>
        </div>
        
        <img id="finalImage" style="margin-top: 30px; max-width: 100%; display: none; border-radius: 8px; border: 1px solid #FFA515;" alt="Draft Recap Output">
        
        <br>
        <button id="downloadBtn" class="tool-btn btn-dl" style="display:none; margin-top: 20px;" onclick="downloadImg()">
            DOWNLOAD DRAFT IMAGE
        </button>
    </div>
</main>

<script src="/javascript/sfb-generator.js"></script>
{% include footer.html %}
