---
layout: null
---
{% include header.html %}

<main class="page-container" style="padding: 40px 20px; max-width: 1100px; margin: 40px auto; background: #ffffff; border-radius: 12px; border: 1px solid #eee;">
    
    <h1 style="text-align: center; color: #1a1a1a; text-transform: uppercase;">Rookie Draft Recap</h1>
    <div style="width: 100%; max-width: 200px; height: 8px; background-color: #ffa515; margin: 10px auto 30px auto;"></div>

    <div class="form-content" style="text-align: center;">
        <input type="text" id="username" placeholder="Sleeper Username" style="width: 100%; max-width: 400px; padding: 15px; border-radius: 30px; border: 1px solid #ced4da; margin-bottom: 10px;">
        <br>
        <button onclick="findLeagues()" style="background: #ffa515; padding: 15px 30px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer;">FIND MY LEAGUES</button>
        
        <div id="loader" style="color: #ffa515; display: none; margin: 15px; font-weight: bold;">SYNCING DATA...</div>
        
        <div id="step2" style="display:none; margin-top: 20px;">
            <select id="leagueSelect" onchange="generate()" style="width: 100%; max-width: 400px; padding: 15px; border-radius: 30px; border: 1px solid #ced4da;"></select>
        </div>

        <canvas id="canvas" style="display: none;"></canvas>
        <img id="finalImage" style="margin-top: 20px; max-width: 100%; display: none; border-radius: 8px; border: 1px solid #dee2e6;">
        <br>
        <button id="dlBtn" style="display:none; background: #002863; color: white; margin-top: 20px; padding: 15px 30px; border: none; border-radius: 30px;" onclick="downloadImg()">DOWNLOAD RECAP IMAGE</button>
    </div>
</main>

<script src="javascript/draft-recap.js" defer></script>
{% include footer.html %}
