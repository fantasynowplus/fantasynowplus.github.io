layout: null

{% include header.html %}

<main class="page-container" style="padding: 40px 20px; max-width: 1100px; margin: 40px auto;">
    <h1 style="text-align: center;">Rookie Draft Recap</h1>
    
    <div class="form-content" style="text-align: center;">
        <!-- Updated with new classes and proper IDs -->
        <input type="text" id="username" class="tool-input" placeholder="Sleeper Username">
        <br>
        <button onclick="findLeagues()" class="tool-btn btn-find">FIND MY LEAGUES</button>
        
        <div id="loader" class="loader">SYNCING DATA...</div>
        
        <div id="step2" style="display:none; margin-top: 20px;">
            <select id="leagueSelect" onchange="generate()" class="tool-select"></select>
        </div>

        <canvas id="canvas" style="display: none;"></canvas>
        <img id="finalImage" style="margin-top: 30px; max-width: 100%; display: none; border-radius: 8px; border: 1px solid #FFA515;">
        
        <br>
        <button id="dlBtn" class="tool-btn btn-dl" style="display:none;" onclick="downloadImg()">DOWNLOAD RECAP IMAGE</button>
    </div>
</main>

<script src="javascript/draft-recap.js"></script>
{% include footer.html %}
