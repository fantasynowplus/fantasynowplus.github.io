---
layout: default
---
{% include header.html %}

<main class="page-container" style="padding: 40px 20px; max-width: 1100px; margin: 40px auto;">
    <h1>Fantasy Roster</h1>
    
    <div class="input-group">
        <input type="text" id="username" class="tool-input" placeholder="Sleeper Username">
        <button onclick="loadLeagues()" class="tool-btn btn-find">FIND MY LEAGUES</button>
    </div>
    
    <div id="loader" class="loader"></div>
    
    <div id="step2" style="display:none;">
        <select id="leagueSelect" onchange="generate()" class="tool-select"></select>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>
    
    <button id="dlBtn" class="tool-btn btn-dl" style="display:none;" onclick="downloadImg()">DOWNLOAD ROSTER IMAGE</button>
</main>

<script src="/javascript/fantasy-roster.js"></script>
{% include footer.html %}
